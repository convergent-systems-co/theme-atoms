name: Bootstrap (one-shot)

on:
  push:
    branches: [main]

jobs:
  install-labels:
    # Fire only on a fresh template *use*, never on the template repo itself.
    if: github.run_number == 1 && github.event.repository.is_template != true
    permissions:
      issues: write
      contents: read
    uses: convergent-systems-co/repo-standards/.github/workflows/label-install.yml@v1
    with:
      labels-ref: v1
      delete-others: false

  bootstrap:
    needs: install-labels
    # Fire only on a fresh template *use*, never on the template repo itself.
    if: github.run_number == 1 && github.event.repository.is_template != true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable secret scanning + push protection
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh api -X PATCH "repos/$REPO" \
            --input - <<< '{"security_and_analysis":{"secret_scanning":{"status":"enabled"},"secret_scanning_push_protection":{"status":"enabled"}}}' \
            || echo "WARN: secret scanning toggle requires GHAS for private repos or admin perms — skipping"

      - name: File seed issues
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh issue list --repo "$REPO" --search "Welcome in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Welcome issue already exists (#$existing). Skipping seed."
            exit 0
          fi

          mapfile -t seed_files < <(ls .github/seed-issues/*.md 2>/dev/null)
          if [ ${#seed_files[@]} -eq 0 ]; then
            echo "No seed-issues to file."
            exit 0
          fi

          # Collect titles for the welcome message bullets while we file each issue.
          titles=()
          for f in "${seed_files[@]}"; do
            front=$(awk '/^---$/{n++; next} n==1' "$f")
            body=$(awk '/^---$/{n++; next} n==2' "$f")
            # Two-step parse: strip wrapping quotes when present, then handle unquoted form.
            title=$(echo "$front"  | grep -E '^title:'  | sed -E 's/^title: *"([^"]*)"$/\1/; s/^title: *([^"][^"]*)$/\1/')
            labels=$(echo "$front" | grep -E '^labels:' | sed -E 's/^labels: *\[(.+)\]$/\1/' | tr -d '"' | tr -d ' ')

            titles+=("$title")
            gh issue create --repo "$REPO" \
              --title "$title" \
              --body  "$body" \
              --label "$labels"
          done

          # Build the welcome body dynamically from what we actually filed.
          # Per-template constant: name of the upstream template this repo was bootstrapped from.
          source_repo="convergent-systems-co/astro-tf-app-template"
          {
            printf '# Welcome to this repo\n\n'
            printf 'Bootstrapped from [`%s`](https://github.com/%s).\n\n' "$source_repo" "$source_repo"
            printf '%d seed issues have been filed. Resolve in order — issue #1 asks you to confirm or switch the default AGPL-3.0 license:\n\n' "${#titles[@]}"
            for t in "${titles[@]}"; do
              printf -- '- [ ] %s\n' "$t"
            done
            printf '\nTriage and label cleanup run automatically via reusable workflows from [`repo-standards@v1`](https://github.com/convergent-systems-co/repo-standards/tree/v1).\n'
          } > /tmp/welcome.md

          gh issue create --repo "$REPO" --title "Welcome to ${REPO##*/}" --body-file /tmp/welcome.md --label "kind/docs,area/core,priority/low"

      - name: Self-cleanup commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -d ".github/seed-issues" ] && [ ! -f ".github/workflows/bootstrap.yml" ]; then
            echo "Scaffolding already cleaned up."
            exit 0
          fi

          git rm -rf .github/seed-issues 2>/dev/null || true
          git rm    .github/workflows/bootstrap.yml 2>/dev/null || true

          if ! git status --short | grep -q .; then
            echo "No scaffolding files to remove."
            exit 0
          fi

          git commit -m "chore: remove bootstrap scaffolding"
          git pull --rebase origin main

          # Try direct push first; if branch protection blocks it, open a PR.
          if git push origin HEAD:main 2>/tmp/push.err; then
            echo "Pushed cleanup directly to main."
            exit 0
          fi

          if ! grep -qE "(protected branch|repository rule|push declined)" /tmp/push.err; then
            cat /tmp/push.err >&2
            echo "Unexpected push failure (not branch-protection related)." >&2
            exit 1
          fi

          echo "Direct push blocked by branch protection — opening a PR instead."
          branch="bootstrap/remove-scaffolding"
          git push origin "HEAD:$branch"
          gh pr create --repo "$REPO" \
            --base main --head "$branch" \
            --title "chore: remove bootstrap scaffolding" \
            --body "Automated cleanup PR opened by the one-shot bootstrap workflow. Direct push to \`main\` was blocked by branch protection, so the scaffolding removal is going through review here. Merge to complete the bootstrap." \
            --label "kind/chore,area/ci,priority/high"
