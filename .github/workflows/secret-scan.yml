name: Secret scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@v3.95.3
        with:
          extra_args: --only-verified
