name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: install
        working-directory: web
        run: npm ci
      - name: typecheck (astro check)
        working-directory: web
        run: npm run check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: install
        working-directory: web
        run: npm ci
      - name: build
        working-directory: web
        run: npm run build
      - name: upload dist
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: web/dist/
          retention-days: 7
