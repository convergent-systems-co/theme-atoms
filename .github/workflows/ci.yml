name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: typecheck (astro check)
        working-directory: web
        run: pnpm run check
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: build
        working-directory: web
        run: pnpm run build
      - name: upload dist
        uses: actions/upload-artifact@v7
        with:
          name: site-dist
          path: web/dist/
          retention-days: 7
