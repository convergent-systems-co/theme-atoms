name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  deployments: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: install
        working-directory: web
        run: npm ci

      - name: build
        working-directory: web
        run: npm run build

      # Cloudflare Pages deploy.
      # Requires (set by seed issue: "Wire Cloudflare Pages deployment"):
      #   secrets.CLOUDFLARE_API_TOKEN     scope: Account.Cloudflare Pages:Edit
      #   secrets.CLOUDFLARE_ACCOUNT_ID
      #   vars.CLOUDFLARE_PAGES_PROJECT    the Pages project name
      - name: deploy (Cloudflare Pages)
        if: env.CLOUDFLARE_PAGES_PROJECT != ''
        run: |
          npx --yes wrangler@latest pages deploy web/dist \
            --project-name="$CLOUDFLARE_PAGES_PROJECT" \
            --branch=main

      - name: skip deploy notice
        if: env.CLOUDFLARE_PAGES_PROJECT == ''
        run: echo "CLOUDFLARE_PAGES_PROJECT unset — skipping deploy. Configure secrets + vars per seed issue."

      - name: create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" --generate-notes
