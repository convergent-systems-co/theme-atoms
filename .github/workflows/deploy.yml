name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CLOUDFLARE_ACCOUNT_ID: e1fe0f0ce8ff18da4edc118372c30022
  CLOUDFLARE_API_TOKEN: ${{ secrets.CSO_CF_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - name: Validate themes
        run: python3 scripts/validate.py

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify CSO_CF_TOKEN secret is set
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing CSO_CF_TOKEN secret — set at https://github.com/convergent-systems-co/theme-atoms/settings/secrets/actions"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        run: |
          npm install -g wrangler@4
          wrangler pages deploy . \
            --project-name theme-atoms \
            --branch main \
            --commit-dirty=true
