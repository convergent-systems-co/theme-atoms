schema = "https://theme-atoms.com/schemas/theme-v1.json"

[meta]
id = "monokai"
version = "1.0.0"
display_name = "Monokai"
description = "Classic Monokai — warm dark background, vivid accents. Minimal separator, ASCII glyphs by default."
extends_brand = "monokai"

[palette]
fg = "#f8f8f2"
bg = "#272822"
pink = "#f92672"
orange = "#fd971f"
yellow = "#e6db74"
green = "#a6e22e"
blue = "#66d9ef"
purple = "#ae81ff"
muted = "#75715e"

[prompt]
character = "❯"
character_color = "{palette.pink}"
segments = ["cwd", "git-status", "exit-code"]
separator = "minimal"
glyphs = "ascii"

[roles]
ai_tier_local = "{palette.green}"
ai_tier_cloud = "{palette.blue}"
drachma_low = "{palette.pink}"
drachma_ok = "{palette.muted}"
exit_ok = "{palette.muted}"
exit_err = "{palette.pink}"

[syntax]
keyword = "{palette.pink}"
string = "{palette.yellow}"
number = "{palette.purple}"
function = "{palette.green}"
type = "{palette.blue}"
comment = "{palette.muted}"
