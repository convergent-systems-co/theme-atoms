schema = "https://theme-atoms.com/schemas/theme-v1.json"

[meta]
id = "nord-powerline"
version = "1.1.0"
display_name = "Nord — Powerline"
description = "Nord palette with powerline separators and Nerd Font glyphs. North + south status bars, JetBrainsMono Nerd Font preferred."
extends_brand = "nord"

[font]
family = "JetBrainsMono Nerd Font"
fallback = ["JetBrains Mono", "Fira Code", "Menlo", "monospace"]
size = 13
weight = 400
ligatures = true
nerd_font = true

[palette]
# Polar Night
nord0 = "#2e3440"
nord1 = "#3b4252"
nord2 = "#434c5e"
nord3 = "#4c566a"
# Snow Storm
nord4 = "#d8dee9"
nord5 = "#e5e9f0"
nord6 = "#eceff4"
# Frost
nord7 = "#8fbcbb"
nord8 = "#88c0d0"
nord9 = "#81a1c1"
nord10 = "#5e81ac"
# Aurora
nord11 = "#bf616a"
nord12 = "#d08770"
nord13 = "#ebcb8b"
nord14 = "#a3be8c"
nord15 = "#b48ead"
# Aliases the prompt + roles read
fg = "#d8dee9"
bg = "#2e3440"
muted = "#4c566a"
blue = "#5e81ac"
cyan = "#88c0d0"
green = "#a3be8c"
red = "#bf616a"
yellow = "#ebcb8b"
purple = "#b48ead"

[prompt]
character = "❯"
character_color = "{palette.blue}"
segments = ["cwd", "git-status", "ai-tier", "drachma-balance", "exit-code"]
separator = "powerline"
glyphs = "nerd-default"

[roles]
ai_tier_local = "{palette.green}"
ai_tier_cloud = "{palette.blue}"
drachma_low = "{palette.red}"
drachma_ok = "{palette.muted}"
exit_ok = "{palette.muted}"
exit_err = "{palette.red}"

[syntax]
keyword = "{palette.blue}"
string = "{palette.green}"
number = "{palette.yellow}"
function = "{palette.cyan}"
type = "{palette.purple}"
comment = "{palette.muted}"

[layout.north]
enabled = true
background = "{palette.nord1}"
foreground = "{palette.fg}"
left = ["session", "host"]
center = []
right = ["time", "ai-tier"]

[layout.south]
enabled = true
background = "{palette.nord1}"
foreground = "{palette.muted}"
left = ["cwd", "git-status"]
center = []
right = ["exit-code", "duration"]
